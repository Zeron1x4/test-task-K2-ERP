{% extends 'base.html' %}

{% block title %}
Створити кліента
{% endblock %}

{% block body %}
<h1>Створити кліента</h1>
<form method="post">
    <input type="text" name="name" id="name" placeholder="Введіть ім'я та прізвище"><br>
    <input type="email" name="email" id="email" placeholder="Введіть email"><br>
    <button type="submit">Створити</button>
</form>
{% endblock %}
