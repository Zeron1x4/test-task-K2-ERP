{% extends 'base.html' %}

{% block title %}
Створити замовлення
{% endblock %}

{% block body %}
<h1>Створити замовлення</h1>
<form method="post">
    <select name="client_id" required>
        <option value="">Оберіть клієнта</option>
        {% for client in clients %}
            <option value="{{client.id}}">{{ client.name }}</option>
        {% endfor %}
    </select>

    <select name="product_id" required>
        <option value="">Оберіть товар</option>
        {% for product in products %}
            <option value="{{product.id}}">{{ product.name }} - {{ product.price }} грн, В наявності: {{ product.quantity }}</option>
        {% endfor %}
    </select>
    <input type="number" name="quantity" min="1" placeholder="Оберіть потрібну вам кількість">
    <button type="submit">Створити</button>
</form>
{% endblock %}
