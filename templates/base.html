<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <style>
        body {
            background: rgb(26, 26, 26);
            color: rgb(168, 168, 168);
        }

        a {
            text-decoration: none;
            color: rgb(145, 145, 145);
            background: rgb(53, 53, 53);
            border: solid 1px rgb(80, 80, 80);
            border-radius: 10px;
            padding: 5px;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">Головна</a>
        <a href="/create-client">Створити кліента</a>
        <a href="/create-product">Створити товар</a>
        <a href="/create-order">Створити замовлення</a>
    </header>
    {% block body %}{% endblock %}
    {% block script %}{% endblock  %}
</body>
</html>
