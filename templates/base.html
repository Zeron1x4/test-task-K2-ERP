<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <style>
        body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
            background: #1a1a1a;
            color: #e5e5e5;
            font-family: Arial, sans-serif;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        button,
        input,
        select {
            padding: 10px;
            margin: 4px;
        }

        button {
            cursor: pointer;
        }

        form {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #444;
            text-align: left;
        }

        th {
            background: #292929;
        }

        tr:nth-child(even) {
            background: #222;
        }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
    {% block script %}{% endblock  %}
</body>
</html>
